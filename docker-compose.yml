services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: helm
      POSTGRES_USER: helm
      POSTGRES_PASSWORD: helm
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helm -d helm"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:4-management
    environment:
      RABBITMQ_DEFAULT_USER: helm
      RABBITMQ_DEFAULT_PASS: helm
    ports: ["5672:5672", "15672:15672"]
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/api/Helm.Host/Dockerfile
    environment:
      ConnectionStrings__Helm: "Host=postgres;Port=5432;Database=helm;Username=helm;Password=helm"
      Messaging__Provider: RabbitMQ
      Messaging__RabbitMq__Uri: amqp://helm:helm@rabbitmq:5672
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports: ["5000:8080"]

  web-internal:
    profiles: ["full"]
    build:
      context: .
      dockerfile: apps/web-internal/Dockerfile
    ports: ["4200:80"]

volumes:
  pgdata:
